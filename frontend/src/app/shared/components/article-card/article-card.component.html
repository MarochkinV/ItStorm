<div class="article-card" *ngIf="article">
  <div class="article-card-category">{{ article.category }}</div>
  <div class="article-card-image"
       [style.background-image]="'url(' + serverStaticPath + article.image + ')'">
  </div>
  <div class="article-card-title">{{ article.title }}</div>
  <div class="description-container">
    <div class="article-card-description"
         [class.expanded]="isDescriptionExpanded"
         [class.clickable]="shouldShowToggle() && !isDescriptionExpanded"
         (click)="toggleDescription($event)">
      <span class="description-text">{{ truncatedDescription }}</span>
      <span class="description-ellipsis"
            *ngIf="shouldShowToggle() && !isDescriptionExpanded">
    ...</span>
    </div>
    <div class="article-card-description-toggle"
         *ngIf="isDescriptionExpanded"
         (click)="toggleDescription($event)">
      Скрыть
    </div>
  </div>
  <div class="article-card-link">
    <a [routerLink]="['/article', article.url]">Читать дальше</a>
  </div>
</div>
